<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>快感ほじほじ</title>
<style>
  :root {
    --bg-top: #1a1d29;
    --bg-bottom: #0a0c14;
    --accent: #ff6b35;
    --good: #4ade80;
    --bad: #f43f5e;
    --tight: #5a8cff;
    --text: #f4f6fb;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: radial-gradient(ellipse at 50% 30%, var(--bg-top), var(--bg-bottom));
    color: var(--text);
    touch-action: none;
    user-select: none;
  }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  /* ---- HUD ---- */
  #hud {
    position: fixed; inset: 0; pointer-events: none;
    display: flex; flex-direction: column; justify-content: space-between;
    padding: env(safe-area-inset-top, 16px) 16px 24px;
  }
  #topbar { display: flex; justify-content: space-between; align-items: flex-start; }
  .pill {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 999px; padding: 8px 16px;
    backdrop-filter: blur(8px); font-weight: 700;
  }
  .pill small { display:block; font-size: 10px; opacity: 0.6; font-weight: 600; letter-spacing: 1px; }
  .pill span { font-size: 22px; }
  #best span { color: var(--accent); }

  /* ---- meters (浮き具合 / 崩れ) ---- */
  #meter {
    position: fixed; left: 50%; bottom: calc(96px + env(safe-area-inset-bottom)); transform: translateX(-50%);
    width: min(260px, 78vw); pointer-events: none;
    opacity: 0; transition: opacity .25s; display: flex; flex-direction: column; gap: 7px;
  }
  #meter.show { opacity: 1; }
  .mrow { display: flex; align-items: center; gap: 8px; }
  .mlab { font-size: 11px; letter-spacing: 1px; opacity: .75; width: 56px; text-align: right; flex: none; }
  .mbar { flex: 1; height: 9px; border-radius: 999px; overflow: hidden; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); }
  .mfill { height: 100%; width: 0%; transition: width .12s ease-out; }
  .mfill.loose { background: linear-gradient(90deg,#2f8f5a,var(--good)); }
  .mfill.crumb { background: linear-gradient(90deg,#facc15,var(--bad)); }

  /* ---- tool selector ---- */
  #tools {
    position: fixed; left: 50%; bottom: calc(16px + env(safe-area-inset-bottom)); transform: translateX(-50%);
    display: flex; gap: 8px; pointer-events: none; opacity: 0; transition: opacity .25s;
    max-width: 96vw;
  }
  #tools.show { opacity: 1; pointer-events: auto; }
  .tool {
    flex: 1 1 0; min-width: 64px; max-width: 96px;
    background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.14);
    border-radius: 14px; color: var(--text); padding: 8px 4px 6px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    backdrop-filter: blur(8px); transition: all .15s;
  }
  .tool svg { width: 24px; height: 24px; opacity: .85; }
  .tool .tname { font-size: 11px; font-weight: 700; white-space: nowrap; }
  .tool .ease { font-size: 8px; letter-spacing: 1px; color: var(--accent); opacity: .85; margin-top: 1px; }
  .tool.sel { border-color: var(--accent); background: rgba(255,107,53,0.16); }
  .tool.sel svg { opacity: 1; }
  .tool.cool { opacity: .35; filter: grayscale(1); }
  .tool:active { transform: scale(.95); }

  /* ---- instruction ---- */
  #hint {
    position: fixed; left: 50%; bottom: calc(150px + env(safe-area-inset-bottom)); transform: translateX(-50%);
    width: max-content; max-width: 92vw; text-align:center;
    font-size: clamp(12px, 3.4vw, 14px); line-height: 1.6; opacity: 0;
    pointer-events: none; transition: opacity .3s;
  }
  #hint b { color: var(--accent); }

  /* ---- result toast ---- */
  #result {
    position: fixed; left: 50%; top: 38%; transform: translate(-50%,-50%) scale(.7);
    text-align:center; opacity: 0; pointer-events: none; transition: all .35s cubic-bezier(.2,1.4,.4,1);
    width: 92vw;
  }
  #result.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  #resultTitle { font-size: clamp(32px, 10vw, 52px); font-weight: 900; letter-spacing: 1px; }
  #resultSub { font-size: clamp(15px, 4.6vw, 18px); margin-top: 6px; opacity: .85; }
  #resultScore { font-size: clamp(13px, 3.6vw, 15px); margin-top: 10px; opacity:.7; }

  /* ---- start / retry button ---- */
  #cta {
    position: fixed; left: 50%; bottom: calc(40px + env(safe-area-inset-bottom)); transform: translate(-50%,20px);
    background: var(--accent); color: #1a1018; border: none;
    font-size: clamp(16px, 4.6vw, 18px); font-weight: 800; padding: clamp(13px,3.8vw,16px) clamp(32px,9vw,40px); border-radius: 999px;
    box-shadow: 0 10px 30px rgba(255,107,53,.4); cursor: pointer;
    opacity: 0; transition: all .3s; pointer-events: none;
  }
  #cta.show { opacity: 1; transform: translate(-50%,0); pointer-events: auto; }
  #cta:active { transform: translate(-50%,2px) scale(.97); }

  #title {
    position: fixed; inset: 0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap: 8px; text-align:center; padding: 0 20px;
    background: radial-gradient(ellipse at 50% 35%, rgba(255,107,53,.12), transparent 60%);
    transition: opacity .4s; z-index: 5;
  }
  #title h1 { font-size: clamp(30px, 9vw, 44px); font-weight: 900; letter-spacing: 1px; }
  #title h1 small { display:block; font-size:clamp(12px,3.4vw,14px); letter-spacing:4px; color:var(--accent); margin-bottom:8px; font-weight:700;}
  #title p { opacity:.75; font-size: clamp(13px,3.6vw,14px); line-height:1.9; margin: 6px 0 28px; max-width: 32em;}
  #title p b { color: var(--accent); }
  #title.hide { opacity: 0; pointer-events: none; }
  #startBtn { background:var(--accent);color:#1a1018;border:none;font-size:18px;font-weight:800;padding:16px 44px;border-radius:999px;box-shadow:0 10px 30px rgba(255,107,53,.4);cursor:pointer; }

  #flash { position: fixed; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 6; }

  /* ---- 光る隙間の画面オーバーレイ（見やすい目印） ---- */
  #gapHud { position: fixed; left: 0; top: 0; transform: translate(-50%,-50%); pointer-events: none; z-index: 4; opacity: 0; transition: opacity .2s; color: var(--accent); }
  #gapHud.show { opacity: 1; }
  #gapHud .ring { width: 60px; height: 60px; border-radius: 50%; border: 4px solid currentColor; box-shadow: 0 0 18px currentColor, inset 0 0 12px currentColor; animation: gapPulse 1s ease-in-out infinite; }
  #gapHud .lbl { text-align: center; margin-top: 4px; font-size: 11px; font-weight: 700; letter-spacing: 1px; color: currentColor; text-shadow: 0 0 6px rgba(0,0,0,.6); }
  @keyframes gapPulse { 0%,100% { transform: scale(0.8); opacity:.65;} 50% { transform: scale(1.2); opacity:1;} }
  #gapHud .ring { position: relative; }
  #gapHud .ring::after { content:''; position:absolute; left:50%; top:50%; width:10px; height:10px; transform:translate(-50%,-50%); border-radius:50%; background:currentColor; box-shadow:0 0 8px currentColor; }
  #chain { position: fixed; left: 50%; top: 86px; transform: translateX(-50%); font-size: clamp(18px,5.5vw,26px); font-weight: 900; letter-spacing: 1px; color: var(--accent); text-shadow: 0 0 12px rgba(255,107,53,.7); opacity: 0; transition: opacity .15s; pointer-events: none; z-index: 5; }
  #chain.show { opacity: 1; }
  #pryFx { position: fixed; left: 0; top: 0; transform: translate(-50%,-50%); font-size: clamp(20px,6vw,32px); font-weight: 900; letter-spacing: 1px; pointer-events: none; z-index: 7; opacity: 0; text-shadow: 0 2px 8px rgba(0,0,0,.5); }
  #pryFx.pop { animation: pryPop .6s ease-out forwards; }
  @keyframes pryPop { 0%{opacity:0; transform:translate(-50%,-50%) scale(.5);} 25%{opacity:1; transform:translate(-50%,-90%) scale(1.1);} 100%{opacity:0; transform:translate(-50%,-170%) scale(1);} }
  #stickType { position: fixed; left: 50%; top: 118px; transform: translateX(-50%); background: rgba(0,0,0,.45); border: 1px solid rgba(255,255,255,.18); border-radius: 999px; padding: 6px 16px; font-size: 13px; font-weight: 700; opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 5; }
  #stickType.show { opacity: 1; }
  #bigFx { position: fixed; left:50%; top:38%; transform: translate(-50%,-50%) scale(.4); font-size: clamp(28px,9vw,52px); font-weight:900; color:#ffd24a; text-shadow:0 0 18px rgba(255,180,40,.85), 0 3px 10px rgba(0,0,0,.5); opacity:0; pointer-events:none; z-index:7; letter-spacing:1px; white-space:nowrap; }
  #bigFx.show { animation: bigPop 1.2s cubic-bezier(.2,1.4,.3,1) forwards; }
  @keyframes bigPop { 0%{opacity:0; transform:translate(-50%,-50%) scale(.4);} 18%{opacity:1; transform:translate(-50%,-50%) scale(1.18);} 72%{opacity:1; transform:translate(-50%,-50%) scale(1);} 100%{opacity:0; transform:translate(-50%,-60%) scale(1);} }

  /* ---- ホワイトモード（背景トグル） ---- */
  #bgToggle { position: fixed; top: calc(env(safe-area-inset-top, 16px) + 4px); left: 50%; transform: translateX(-50%); z-index: 8; width: 40px; height: 40px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: var(--text); font-size: 18px; line-height: 1; cursor: pointer; backdrop-filter: blur(8px); }
  #bgToggle:active { transform: translateX(-50%) scale(.92); }
  body.light { --text: #1c2230; background: radial-gradient(ellipse at 50% 30%, #f7f8fc, #d9deea); }
  body.light .pill { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.12); }
  body.light #bgToggle { background: rgba(0,0,0,0.06); border-color: rgba(0,0,0,0.15); }
  body.light .mbar { background: rgba(0,0,0,0.08); border-color: rgba(0,0,0,0.12); }
  body.light .tool { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.14); }
  body.light #stickType { background: rgba(255,255,255,0.8); border-color: rgba(0,0,0,0.12); }

  @media (max-height: 480px) {
    #meter { bottom: calc(70px + env(safe-area-inset-bottom)); }
    #hint { bottom: calc(118px + env(safe-area-inset-bottom)); }
    #result { top: 34%; }
    #title p { margin: 6px 0 16px; }
  }
  @media (max-width: 360px) {
    .pill { padding: 6px 12px; } .pill span { font-size: 18px; }
    .tool { min-width: 58px; } .tool .tname { font-size: 10px; }
  }
</style>
</head>
<body>
<div id="app"></div>
<div id="flash"></div>
<button id="bgToggle" aria-label="背景の明暗を切り替え">☀</button>
<div id="gapHud"><div class="ring"></div><div class="lbl">ここをこじる</div></div>
<div id="chain"></div>
<div id="pryFx"></div>
<div id="stickType"></div>
<div id="bigFx"></div>
<div id="hud">
  <div id="topbar">
    <div style="display:flex;gap:8px">
      <div class="pill" id="level"><small>LEVEL</small><span>1</span></div>
      <div class="pill" id="combo"><small>COMBO</small><span>0</span></div>
    </div>
    <div class="pill" id="best"><small>BEST</small><span>0</span></div>
  </div>
</div>

<div id="hint"><b>光る隙間</b>を狙って外へフリック＝こじる<br>道具で手応えが変わる・隙間以外をドラッグで視点回転</div>

<div id="meter">
  <div class="mrow"><span class="mlab">浮き具合</span><div class="mbar"><div id="loose" class="mfill loose"></div></div></div>
  <div class="mrow"><span class="mlab">崩れ</span><div class="mbar"><div id="crumb" class="mfill crumb"></div></div></div>
</div>

<div id="tools">
  <button class="tool" data-tool="toothpick"><svg viewBox="0 0 24 24" fill="none"><path d="M4 20 L18 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M18 6 l3 -3" stroke="currentColor" stroke-width="3.2" stroke-linecap="round"/></svg><span class="tname">つまようじ</span></button>
  <button class="tool" data-tool="needle"><svg viewBox="0 0 24 24" fill="none"><path d="M5 20 L17 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="18.5" cy="6.5" r="2.4" stroke="currentColor" stroke-width="1.6"/></svg><span class="tname">針・ピン</span></button>
  <button class="tool" data-tool="hook"><svg viewBox="0 0 24 24" fill="none"><path d="M12 4 L12 13 a4 4 0 1 1 -5 -1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><span class="tname">フック</span></button>
  <button class="tool" data-tool="tweezers"><svg viewBox="0 0 24 24" fill="none"><path d="M9 3 L11.4 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M15 3 L12.6 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M11.4 13 L12 21 L12.6 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="tname">ピンセット</span></button>
  <button class="tool" data-tool="toothbrush"><svg viewBox="0 0 24 24" fill="none"><path d="M4 20 L14 10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M13 5 L19 11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M14.5 4 L16 5.5 M16.5 6 L18 7.5 M12.5 6.5 L14 8 M14 8.5 L15.5 10" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg><span class="tname">歯ブラシ</span></button>
  <button class="tool" data-tool="earpick"><svg viewBox="0 0 24 24" fill="none"><path d="M5 20 L15 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="17" cy="8" r="3" stroke="currentColor" stroke-width="1.5"/></svg><span class="tname">耳かき</span></button>
</div>

<div id="result">
  <div id="resultTitle"></div>
  <div id="resultSub"></div>
  <div id="resultScore"></div>
</div>

<button id="cta">もう一回</button>

<div id="title">
  <h1><small>KAIKAN HOJIHOJI</small>快感ほじほじ</h1>
  <p>IQOSのチャンバーに残った<b>中折れスティック</b>を、道具でほじって救出せよ。<br><b>光る隙間</b>に道具を差し込み、外側へこじって少しずつ浮かせる。<br>道具ごとに手応えが違う。雑にやると…崩れる。</p>
  <button id="startBtn">掘る</button>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
} }
</script>
<script type="module">
import * as THREE from 'three';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

/* =========================================================
   中折れ発掘 — Three.js
   操作: 光る隙間に道具を差し込み、外へフリックして“こじる”
   道具を選択 / 隙間以外をドラッグで視点回転・ピンチでズーム
   ========================================================= */

const el = (id) => document.getElementById(id);
const hud = { level: el('level').querySelector('span'), combo: el('combo').querySelector('span'), best: el('best').querySelector('span') };
const toolsEl = el('tools');

// ---------- Scene ----------
const app = el('app');
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x0a0c14, 16, 34);

const camera = new THREE.PerspectiveCamera(42, innerWidth/innerHeight, 0.1, 100);
const LOOK_Y = 1.6;                 // 注視点＝本体上部（口より少し下げて全体を見せる）
camera.position.set(0.9, 3.8, 2.7); // 斜め3/4ビュー（立体感を出す）
camera.lookAt(0, LOOK_Y, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.outputColorSpace = THREE.SRGBColorSpace;
app.appendChild(renderer.domElement);

// ---------- Environment（金属の映り込み） ----------
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

// ---------- 視点操作（隙間以外をドラッグ=回転 / ピンチ=ズーム） ----------
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, LOOK_Y, 0);
controls.enableDamping = true; controls.dampingFactor = 0.08;
controls.enablePan = false;
controls.minDistance = 4; controls.maxDistance = 16;
controls.minPolarAngle = 0.12; controls.maxPolarAngle = 1.35;
controls.rotateSpeed = 0.8;
controls.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.ROTATE };
controls.touches = { ONE: THREE.TOUCH.ROTATE, TWO: THREE.TOUCH.DOLLY_ROTATE };
controls.update();

// ---------- Lights ----------
scene.add(new THREE.AmbientLight(0xffffff, 0.25));
const key = new THREE.DirectionalLight(0xffffff, 1.1);
key.position.set(4, 9, 7); key.castShadow = true;
key.shadow.mapSize.set(2048,2048); key.shadow.camera.near=1; key.shadow.camera.far=30;
key.shadow.bias = -0.0004;
scene.add(key);
const rim = new THREE.PointLight(0xffffff, 0.6, 30); rim.position.set(-5, 3, -4); scene.add(rim);
const fill = new THREE.PointLight(0xbcd2ff, 0.5, 30); fill.position.set(5, 1, 6); scene.add(fill);

// ---------- Floor ----------
const floor = new THREE.Mesh(new THREE.CircleGeometry(14, 48),
  new THREE.MeshStandardMaterial({ color:0x14161f, roughness:0.9, metalness:0.1 }));
floor.rotation.x = -Math.PI/2; floor.position.y = -2.4; floor.receiveShadow = true;
scene.add(floor);

// ---------- IQOS ILUMA ONE 風ホルダー ----------
const holder = new THREE.Group();
const DEPTH = 0.55;   // 平たい楕円断面：奥行き/幅（前後を薄く）
const TOP_SLANT = 0.22;   // 上面の前傾（前=+z 側が低い斜めカット）
const BODY_COLOR = 0x5a2bd6;
const bodyMat = new THREE.MeshPhysicalMaterial({
  color: BODY_COLOR, metalness: 0.85, roughness: 0.38,
  clearcoat: 1.0, clearcoatRoughness: 0.22, envMapIntensity: 1.2
});
// 角丸長方形（フラット面＋丸い角）の断面 ＋ 丸い縦穴(挿入口) を押し出し
function roundedRect(w, h, r){
  const s = new THREE.Shape();
  s.moveTo(-w+r, -h);
  s.lineTo(w-r, -h);  s.quadraticCurveTo(w, -h, w, -h+r);
  s.lineTo(w, h-r);   s.quadraticCurveTo(w, h, w-r, h);
  s.lineTo(-w+r, h);  s.quadraticCurveTo(-w, h, -w, h-r);
  s.lineTo(-w, -h+r); s.quadraticCurveTo(-w, -h, -w+r, -h);
  return s;
}
const HALF_W = 0.50, HALF_D = 0.26, CORNER = 0.20, BORE = 0.17;
const HOLE_X = 0.20;   // 挿入口を中心から横(サイド=+x)へオフセット
const BODY_BOT = -2.15, BODY_LEN = 4.4;
const shape = roundedRect(HALF_W, HALF_D, CORNER);
const boreHole = new THREE.Path(); boreHole.absarc(HOLE_X, 0, BORE, 0, Math.PI*2, true); shape.holes.push(boreHole);
const bodyGeo = new THREE.ExtrudeGeometry(shape, {
  depth: BODY_LEN, bevelEnabled: true, bevelThickness: 0.22, bevelSize: 0.16, bevelSegments: 6, curveSegments: 24
});
bodyGeo.rotateX(-Math.PI/2);            // 押し出し軸を縦(Y)へ
bodyGeo.translate(0, BODY_BOT, 0);      // 底を BODY_BOT へ
// 上面を前傾の斜めカットにシア（y>2.0 の頂点を z に応じて上下させる）
{ const p = bodyGeo.attributes.position;
  for(let i=0;i<p.count;i++){ const y=p.getY(i); if(y>2.0){ p.setY(i, y - TOP_SLANT*p.getZ(i)); } }
  bodyGeo.computeVertexNormals(); }
const holderBody = new THREE.Mesh(bodyGeo, bodyMat);
holderBody.castShadow = true; holderBody.receiveShadow = true; holder.add(holderBody);

const chamberMat = new THREE.MeshStandardMaterial({ color:0x0a0a0c, roughness:0.7, metalness:0.4 });
const chamber = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.16, 0.95, 36, 1, true), chamberMat);
chamber.position.set(HOLE_X, 2.0, 0); holder.add(chamber);   // 丸い穴の内側ライナー（暗い）
const chamberFloor = new THREE.Mesh(new THREE.CircleGeometry(0.16, 32),
  new THREE.MeshStandardMaterial({ color:0x18181c, roughness:0.5, metalness:0.6 }));
chamberFloor.rotation.x = -Math.PI/2; chamberFloor.position.set(HOLE_X, 1.62, 0); holder.add(chamberFloor);

// ---------- 前面（蓋を寄せた側=+x）に バッテリー残量メーター＋電源ボタン ----------
// ---------- 薄い側面（蓋を引く側＝左エッジ）に 電源ボタン＋バッテリーメーター ----------
const sidePanel = new THREE.Group();
sidePanel.position.set(-0.66, 1.05, 0);   // 左の狭い側面の実表面(bevel込み)
sidePanel.rotation.y = -Math.PI/2;        // ローカル前面(+z)を左(-x)へ向ける

function makePoints(n, color, size){
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(n*3); geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  const mat = new THREE.PointsMaterial({ color, size, transparent:true, opacity:0 });
  const pts = new THREE.Points(geo, mat); scene.add(pts);
  const vel = []; for(let i=0;i<n;i++) vel.push(new THREE.Vector3());
  return { n, geo, pos, mat, vel };
}
function burstPts(P, origin, spread, up){
  for(let i=0;i<P.n;i++){
    P.pos[i*3]=origin.x; P.pos[i*3+1]=origin.y; P.pos[i*3+2]=origin.z;
    const a=Math.random()*Math.PI*2, r=spread*(0.3+Math.random());
    P.vel[i].set(Math.cos(a)*r, up*(0.5+Math.random()), Math.sin(a)*r);
  }
  P.geo.attributes.position.needsUpdate=true; P.mat.opacity=1;
}
function updatePts(P, g, fade){
  if(P.mat.opacity<=0) return;
  for(let i=0;i<P.n;i++){ P.vel[i].y -= g; P.pos[i*3]+=P.vel[i].x; P.pos[i*3+1]+=P.vel[i].y; P.pos[i*3+2]+=P.vel[i].z; }
  P.geo.attributes.position.needsUpdate=true; P.mat.opacity = Math.max(0, P.mat.opacity-fade);
}

function makeSoftTexture(){
  const cv = document.createElement('canvas'); cv.width = cv.height = 128;
  const g = cv.getContext('2d');
  const grd = g.createRadialGradient(64,64,0,64,64,64);
  grd.addColorStop(0,'rgba(255,255,255,1)'); grd.addColorStop(0.4,'rgba(255,255,255,0.45)'); grd.addColorStop(1,'rgba(255,255,255,0)');
  g.fillStyle = grd; g.fillRect(0,0,128,128);
  return new THREE.CanvasTexture(cv);
}

  s.visible = false; s.userData = {}; scene.add(s); smokes.push(s);
}
let smokeTimer = 0;
function emitSmoke(){
  const s = smokes.find(x=>!x.visible); if(!s) return;
  s.visible = true; s.position.set((Math.random()-0.5)*0.18, 2.45, (Math.random()-0.5)*0.18);
  s.userData = { life:1, vy:0.005+Math.random()*0.004, vx:(Math.random()-0.5)*0.0025, scale:0.22+Math.random()*0.22, rot:(Math.random()-0.5)*0.02 };
  s.scale.setScalar(s.userData.scale);
}
function updateSmoke(dt){
  smokeTimer += dt; if(smokeTimer > 260){ smokeTimer = 0; emitSmoke(); }
  for(const s of smokes){ if(!s.visible) continue; const u = s.userData;
    u.life -= 0.006; if(u.life<=0){ s.visible=false; continue; }
    s.position.y += u.vy; s.position.x += u.vx; u.scale += 0.005; s.scale.setScalar(u.scale);
    s.material.rotation += u.rot; s.material.opacity = Math.sin(u.life*Math.PI)*0.28; }
}

let _hapLabel = null;
function _ensureHaptic(){

  if(!IS_IOS && navigator.vibrate){ try { navigator.vibrate(p); } catch(e){} return; }
  if(IS_IOS){ const now = performance.now(); if(now - _lastHap < 40) return; _lastHap = now; _ensureHaptic(); try { _hapLabel.click(); } catch(e){} }
}

// ---------- Audio ----------
let actx;
function ensureAudio(){ if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)(); }
function pop(){ ensureAudio(); const t=actx.currentTime;
  const o=actx.createOscillator(), g=actx.createGain();
  o.type='sine'; o.frequency.setValueAtTime(180,t); o.frequency.exponentialRampToValueAtTime(900,t+0.07);
  g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.5,t+0.01); g.gain.exponentialRampToValueAtTime(0.0001,t+0.25);
  o.connect(g).connect(actx.destination); o.start(t); o.stop(t+0.3); }
function snap(){ ensureAudio(); const t=actx.currentTime;
  const buf=actx.createBuffer(1, actx.sampleRate*0.15, actx.sampleRate);
  const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,3);
  const s=actx.createBufferSource(); s.buffer=buf;
  const g=actx.createGain(); g.gain.value=0.5; s.connect(g).connect(actx.destination); s.start(t); }
function tick(f){ ensureAudio(); const t=actx.currentTime;
  const o=actx.createOscillator(), g=actx.createGain(); o.type='triangle'; o.frequency.value=f;
  g.gain.setValueAtTime(0.08,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.05);
  o.connect(g).connect(actx.destination); o.start(t); o.stop(t+0.06); }
function thunk(){ ensureAudio(); const t=actx.currentTime;
  const o=actx.createOscillator(), g=actx.createGain(); o.type='sine'; o.frequency.setValueAtTime(90,t);
  g.gain.setValueAtTime(0.25,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.12);
  o.connect(g).connect(actx.destination); o.start(t); o.stop(t+0.14); }
function chord(){ ensureAudio(); const t=actx.currentTime;
  [523,659,784,1047].forEach((f,i)=>{ const o=actx.createOscillator(), g=actx.createGain(); o.type='triangle'; o.frequency.value=f;
    const tt=t+i*0.06; g.gain.setValueAtTime(0.0001,tt); g.gain.exponentialRampToValueAtTime(0.32,tt+0.02); g.gain.exponentialRampToValueAtTime(0.0001,tt+0.32);
    o.connect(g).connect(actx.destination); o.start(tt); o.stop(tt+0.34); }); }

  const keys = Object.keys(TOOLS).filter(k=>!TOOLS[k].junk);   // 通常プールは裏枠を除外
  if(Math.random() < 0.05){                                    // 激レア裏枠（歯ブラシ/耳かき）

  }
  gagLoadout = '';
  const thinKeys = keys.filter(k=>TOOLS[k].thin);
  const n = 2 + Math.floor(Math.random()*2);
  const chosen = new Set();
  chosen.add(thinKeys[Math.floor(Math.random()*thinKeys.length)]);
  while(chosen.size < n) chosen.add(keys[Math.floor(Math.random()*keys.length)]);
  availableTools = keys.filter(k=>chosen.has(k));
}

let looseness = 0, crumble = 0, pries = 0;
let combo = 0;
let best = +(localStorage.getItem('nakaore_best')||0);
hud.best.textContent = best;

// ---------- レベル（成功で昇格・最大50） ----------
const MAX_LEVEL = 50;
let level = Math.min(MAX_LEVEL, Math.max(1, +(localStorage.getItem('nakaore_level')||1)));
hud.level.textContent = level;
const D = {};   // 現在レベルの難易度パラメータ
function computeDifficulty(){
  const t = Math.min(1, (level-1)/(MAX_LEVEL-1));   // 0..1
  D.powerMul    = 1 - 0.45*t;        // こじり効率 1.0→0.55（手数が増える）
  D.tightChance = 0.22 + 0.50*t;     // 細い隙間の出現率 0.22→0.72
  D.aimMul      = 1 - 0.45*t;        // 命中域 1.0→0.55
  D.crumbleMul  = 1 + 1.2*t;         // ミスの崩れ量 1.0→2.2
  D.snapFactor  = 1.9 - 0.6*t;       // つまようじが折れる閾値 ×GOOD 1.9→1.3
  D.sink        = t < 0.25 ? 0 : (t-0.25)*0.06;  // 放置で沈み戻る /秒（Lv13付近〜）
}
computeDifficulty();

function updateMeters(){
  el('loose').style.width = Math.round(looseness*100)+'%';
  el('crumb').style.width = Math.round(crumble*100)+'%';
}
function updateFragVisual(){
  frag.position.y = FRAG_BASE_Y + looseness*0.85;
  frag.rotation.z = Math.cos(markerAngle)*looseness*0.28;
  frag.rotation.x = Math.sin(markerAngle)*looseness*0.28;
}

// ---------- コンボ倍率 / パーフェクト演出 / 種類トースト ----------
let streak = 0;   // attempt内の連続クリーンこじり
function chainMul(){ return 1 + Math.min(streak,10)*0.12; }   // 最大 ×2.2
function updateChainUI(){
  const c = el('chain');
  if(streak >= 2){ c.textContent = 'RUSH ×' + chainMul().toFixed(1); c.classList.add('show'); }
  else c.classList.remove('show');
}
function showPryFx(q, sc){
  const f = el('pryFx');
  f.textContent = q==='PERFECT' ? 'PERFECT!' : q==='GOOD' ? 'GOOD' : 'OK';
  f.style.color = q==='PERFECT' ? '#ff6b35' : q==='GOOD' ? '#4ade80' : '#cbd5e1';
  f.style.left = sc.x+'px'; f.style.top = sc.y+'px';
  f.classList.remove('pop'); void f.offsetWidth; f.classList.add('pop');
}
let typeToastT = 0;
function showTypeToast(name){
  const e = el('stickType'); e.textContent = name + 'スティック'; e.classList.add('show');
  clearTimeout(typeToastT); typeToastT = setTimeout(()=> e.classList.remove('show'), 1700);
}

function startGame(){
  el('title').classList.add('hide');
  el('cta').classList.remove('show');
  el('result').classList.remove('show');
  computeDifficulty(); hud.level.textContent = level;
  pickLoadout(); applyLoadout();
  if(gagLoadout) showBigFx((TOOLS[gagLoadout].emoji||'') + ' ' + TOOLS[gagLoadout].label + '縛り!?');
  looseness = 0; crumble = 0; pries = 0; flying = false; toolCoolUntil = 0;
  streak = 0; pickStickType(); tobaccoMat.color.setHex(stickType.color);
  el('chain').classList.remove('show'); showTypeToast(stickType.name);
  frag.position.set(HOLE_X,FRAG_BASE_Y,0); frag.rotation.set(0,0,0);
  setMarker(); updateFragVisual(); updateMeters();
  frag.visible = false; marker.visible = false; toolPivot.visible = false; toolLever = 0;
  capAngle = 0; capTarget = 1;   // 閉じた状態から開く演出
  el('meter').classList.add('show');
  toolsEl.classList.add('show');
  el('hint').style.opacity = '0.9';
  state = STATE.PLAYING;
}

// =========================================================
//  Input — 「こじる」発掘
// =========================================================
function pointerXY(e){ const t = e.touches? e.touches[0] : e; return { x:t.clientX, y:t.clientY }; }
function worldToScreen(v){ const t = v.clone().project(camera); return { x:(t.x*0.5+0.5)*innerWidth, y:(-t.y*0.5+0.5)*innerHeight }; }

let digging = false, pryStart = null, pryCur = null, outDir = {x:0,y:-1}, outValid = true;
function pryOutward(){
  const ex = pryCur.x-pryStart.x, ey = pryCur.y-pryStart.y;
  return outValid ? (ex*outDir.x + ey*outDir.y) : Math.hypot(ex, ey);   // 真上視点では総ドラッグ量
}

function onDown(e){
  if(state !== STATE.PLAYING) return;
  if(!marker.visible) return;                        // キャップが開く前は不可
  if(performance.now() < toolCoolUntil) return;     // 道具が折れて使用不可中
  const p = pointerXY(e);
  const m = worldToScreen(markerWorld());
  const cen = worldToScreen(new THREE.Vector3(0, RIM_Y, 0));
  const aimR = Math.min(innerWidth, innerHeight) * 0.30 * Math.max(0.8, D.aimMul);   // 開始判定は広めで反応良く
  if(Math.hypot(p.x-m.x, p.y-m.y) > aimR) return;   // 隙間外 → 視点回転に任せる
  ensureAudio();
  controls.enabled = false;
  digging = true; pryStart = { x:p.x, y:p.y }; pryCur = { x:p.x, y:p.y };
  const ox = m.x-cen.x, oy = m.y-cen.y; const ol = Math.hypot(ox,oy);
  outValid = ol > 14; outDir = outValid ? { x:ox/ol, y:oy/ol } : { x:0, y:-1 };
  el('hint').style.opacity = '0';
}
function onMove(e){
  if(!digging) return; pryCur = pointerXY(e);
  const GOOD = Math.min(innerWidth, innerHeight) * 0.16;
  toolLever = Math.max(0, Math.min(1, pryOutward() / GOOD));   // ドラッグに追従して道具がてこ動作
}

function onUp(e){
  controls.enabled = true;
  if(!digging){ return; }
  digging = false;
  if(e && e.clientX != null) pryCur = { x:e.clientX, y:e.clientY };   // 離した位置を確実に反映
  if(!pryStart || !pryCur){ return; }

  const outward = pryOutward();                     // 外向き成分(px)
  const GOOD = Math.min(innerWidth, innerHeight) * 0.16;
  const T = TOOLS[tool];
  pries++;

  if(outward <= GOOD*0.08){
    // こじれていない＝奥に突いた → 押し込み
    crumble = Math.min(1, crumble + 0.05*D.crumbleMul*stickType.crumbleMul);
    looseness = Math.max(0, looseness - (T.pokeRisk ? 0.06 : 0.02));
    streak = 0; updateChainUI(); thunk(); buzz(14);
  } else if(T.canSnap && outward > GOOD*D.snapFactor){
    // 力みすぎでつまようじが折れる
    crumble = Math.min(1, crumble + 0.10*D.crumbleMul*stickType.crumbleMul);
    toolCoolUntil = performance.now() + 1100;
    streak = 0; updateChainUI(); snap(); buzz(170); addShake(0.35);
  } else {
    const force = Math.min(1.3, outward / GOOD);
    // 狙い精度＝パーフェクト判定（中心に近い＋適正な力）
    const m = worldToScreen(markerWorld());
    const aimR = Math.min(innerWidth, innerHeight) * 0.20 * TOOLS[tool].aimMul * D.aimMul;
    const aimRatio = Math.min(1, Math.hypot(pryStart.x-m.x, pryStart.y-m.y) / aimR);
    const inForce = force >= 0.65 && force <= 1.2;
    let quality='OK', qMul=1.0;
    if(aimRatio < 0.45 && inForce){ quality='PERFECT'; qMul=1.9; }
    else if(aimRatio < 0.8 && force >= 0.45){ quality='GOOD'; qMul=1.25; }
    streak++;
    let gain = T.power * Math.min(1, force) * D.powerMul * stickType.gainMul * qMul * chainMul();
    if(markerTight && !T.thin){ gain *= 0.15; crumble = Math.min(1, crumble + 0.06*D.crumbleMul*stickType.crumbleMul); streak = Math.max(0, streak-2); }
    if(T.lift && looseness > 0.55) gain *= 1.6;                                         // フックは浮いてから強い
    if(T.finisher && looseness > 0.7) gain = Math.max(gain, 0.5*D.powerMul);            // ピンセットの仕上げ
    looseness = Math.min(1, looseness + gain);
    crumbs(markerWorld());
    tick(170 + looseness*220 + (quality==='PERFECT'?220:0));
    buzz(quality==='PERFECT' ? [8,22,46] : Math.round(10 + gain*130));
    addShake(0.1 + gain*0.5 + (quality==='PERFECT'?0.2:0));
    if(quality==='PERFECT') flash();
    showPryFx(quality, m); updateChainUI();
    toolLever = 0.9;   // こじり切った瞬間の手元の跳ね
  }

  updateFragVisual(); setMarker(); updateMeters();
  pryStart = pryCur = null;

  if(looseness >= 1) winDig();
  else if(crumble >= 1) failDig();
}

// =========================================================
//  Outcomes
// =========================================================
let flying = false, flyV = 0;

// 抜き演出（big=3連続以上でマシマシ）
function extractFx(big){
  burst(markerWorld().setY(2.7)); pop(); fireShock(); flash();
  if(!big){ addShake(0.7); buzz([22,35,95]); return; }
  addShake(1.1); buzz([20,30,40,30,140]);
  for(let i=0;i<2;i++) burst(markerWorld().setY(2.9 + Math.random()*0.5));
  setTimeout(()=>{ fireShock(); flash(); burst(markerWorld().setY(3.0)); }, 130);
  setTimeout(()=>{ fireShock(); chord(); burst(markerWorld().setY(3.2)); addShake(0.5); }, 270);
  showBigFx();
}
function showBigFx(txt){
  const e = el('bigFx'); e.textContent = txt || (combo + '連続！マシマシ');
  e.classList.remove('show'); void e.offsetWidth; e.classList.add('show');
}

function winDig(){
  state = STATE.WON;
  flying = true; flyV = 0.13;
  marker.visible = false; toolPivot.visible = false;
  el('meter').classList.remove('show'); toolsEl.classList.remove('show');
  streak = 0; el('chain').classList.remove('show');

  combo++;
  const big = combo >= 3;     // 3連続成功で抜き演出マシマシ
  extractFx(big);

  const cleared = level;
  const cleanliness = Math.round((1 - crumble) * 100);
  const gained = Math.round((cleanliness + Math.max(0,(12-pries))*5 + combo*10) * (1 + (cleared-1)*0.06));
  best = Math.max(best, gained); localStorage.setItem('nakaore_best', best);

  let rank, sub, color='var(--good)', cta='次のレベルへ';
  if(cleared >= MAX_LEVEL){
    rank='ALL CLEAR!!'; sub='全50レベル制覇！神の手'; color='var(--accent)'; cta='もう一回';
  } else {
    if(cleanliness >= 90 && pries <= 6){ rank='PERFECT!!'; sub='達人のほじり'; color='var(--accent)'; }
    else if(cleanliness >= 70){ rank='CLEAN!'; sub='キレイに救出'; }
    else { rank='救出成功'; sub='ボロボロだけど回収'; color='#facc15'; }
    level = Math.min(MAX_LEVEL, level+1);
    localStorage.setItem('nakaore_level', level);
  }
  hud.combo.textContent = combo; hud.best.textContent = best; hud.level.textContent = level;
  showResult(rank, sub, `LV${cleared} クリア　+${gained}（キレイさ ${cleanliness}% / ${pries}手 / ×${combo}）`, color, cta);
}

function failDig(){
  state = STATE.LOST;
  snap(); addShake(0.5); buzz(180);
  for(let i=0;i<3;i++) crumbs(markerWorld().setY(2.4));
  frag.visible = false; marker.visible = false; toolPivot.visible = false;
  el('meter').classList.remove('show'); toolsEl.classList.remove('show');
  streak = 0; el('chain').classList.remove('show');
  combo = 0; hud.combo.textContent = 0;
  showResult('崩れた…', 'ほじりすぎ・力みすぎ', `LV${level} 失敗・再挑戦　COMBO リセット`, 'var(--bad)', 'もう一回');
}

function showResult(title, sub, score, color, cta){
  el('resultTitle').textContent = title; el('resultTitle').style.color = color;
  el('resultSub').textContent = sub; el('resultScore').textContent = score;
  el('result').classList.add('show');
  const b = el('cta'); b.textContent = cta; b.classList.add('show');
}

// =========================================================
//  Loop
// =========================================================
let prevT = performance.now();
function animate(){
  requestAnimationFrame(animate);
  const now = performance.now(); const dt = now - prevT; prevT = now;

  holder.rotation.z *= 0.85;

  // キャップ開閉アニメ（横へスライド）
  capAngle += (capTarget - capAngle) * 0.18;
  capPivot.position.x = HOLE_X + CAP_SLIDE_X * capAngle;
  capPivot.position.y = 2.46 + CAP_RISE_Y * capAngle;
  // 開ききったら中身（中折れ・マーカー・道具）を露出
  if(state===STATE.PLAYING && capTarget===1 && capAngle>0.7 && !marker.visible){
    frag.visible = true; marker.visible = true; toolPivot.visible = true; updateToolTransform();
  }

  // 救出されたフラグメントの飛翔
  if(flying){
    flyV -= 0.006; frag.position.y += flyV*4;
    frag.rotation.y += 0.2; frag.rotation.x += 0.1;
    if(frag.position.y > 6){ flying=false; frag.visible=false; }
  }

  // 道具：隙間へ追従＋てこ動作（離すと戻る）
  if(toolPivot.visible){ updateToolTransform(); if(!digging) toolLever *= 0.86; }

  // マーカー：位置・色・脈動
  if(marker.visible){
    const w = markerWorld(); marker.position.copy(w);
    marker.material.color.setHex(markerTight ? 0x5a8cff : 0xff6b35);
    const s = 1 + Math.sin(now*0.008)*0.18; marker.scale.setScalar(s);
    marker.material.opacity = 0.7 + Math.sin(now*0.008)*0.25;
    const sc = worldToScreen(w); const gh = el('gapHud');
    gh.style.left = sc.x + 'px'; gh.style.top = sc.y + 'px';
    gh.style.color = markerTight ? '#5a8cff' : '#ff6b35';
    gh.classList.add('show');
  } else {
    el('gapHud').classList.remove('show');
  }

  // 沈み戻り（高レベル）＋待機中の微かな揺れで誘う
  if(state===STATE.PLAYING && !digging){
    if(D.sink > 0 && looseness > 0){ looseness = Math.max(0, looseness - D.sink*dt/1000); updateMeters(); }
    frag.position.y = FRAG_BASE_Y + looseness*0.85 + Math.sin(now*0.003)*0.012;
  }

  // 道具クールダウンの見た目
  const tpBtn = toolsEl.querySelector('[data-tool="toothpick"]');
  if(tpBtn) tpBtn.classList.toggle('cool', now < toolCoolUntil && tool==='toothpick');

  led.material.emissive.setHex(state===STATE.LOST ? 0xf43f5e : 0x4ade80);
  updatePts(spark, 0.008, 0.012);
  updatePts(crumb, 0.006, 0.02);
  updateSmoke(dt);
  updateShock();

  controls.update();
  if(shake > 0.001){
    shake *= 0.86;
    camera.position.x += (Math.random()-0.5)*shake*0.5;
    camera.position.y += (Math.random()-0.5)*shake*0.5;
  }
  renderer.render(scene, camera);
}
animate();

// =========================================================
//  Wiring
// =========================================================
el('startBtn').addEventListener('click', ()=>{ ensureAudio(); startGame(); });
el('cta').addEventListener('click', ()=>{ ensureAudio(); startGame(); });

for(const b of toolsEl.querySelectorAll('.tool')){
  b.addEventListener('click', ()=>{ ensureAudio(); selectTool(b.dataset.tool); });
  const e = TOOLS[b.dataset.tool].ease;
  const d = document.createElement('div'); d.className = 'ease';
  d.textContent = '●'.repeat(e) + '○'.repeat(5-e);   // ほじりやすさ
  b.appendChild(d);
}
selectTool('toothpick');

// ---------- 背景テーマ（ダーク / ホワイト）トグル ----------
function setTheme(light){
  document.body.classList.toggle('light', light);
  scene.fog.color.setHex(light ? 0xe9ecf3 : 0x0a0c14);
  floor.material.color.setHex(light ? 0xdde2ec : 0x14161f);
  const b = el('bgToggle'); if(b) b.textContent = light ? '🌙' : '☀';
  localStorage.setItem('nakaore_theme', light ? 'light' : 'dark');
}
setTheme(localStorage.getItem('nakaore_theme') === 'light');
el('bgToggle').addEventListener('click', ()=> setTheme(!document.body.classList.contains('light')));

const cdom = renderer.domElement;
cdom.addEventListener('pointerdown', onDown);
cdom.addEventListener('pointermove', onMove);
window.addEventListener('pointerup', onUp);
window.addEventListener('pointercancel', onUp);

// 縦横比に応じた画角・距離の自動調整
const OBJ_H = 4.6;
function frameCamera(){
  const aspect = innerWidth / innerHeight;
  camera.aspect = aspect;
  const fill = aspect < 0.65 ? 0.52 : (aspect < 1.3 ? 0.62 : 0.72);
  const visH = OBJ_H / fill;
  const dist = (visH/2) / Math.tan((camera.fov*Math.PI/180)/2);
  const dir = camera.position.clone().sub(controls.target);
  if(dir.lengthSq() < 1e-4) dir.set(0,1,1);
  dir.setLength(THREE.MathUtils.clamp(dist, controls.minDistance, controls.maxDistance));
  camera.position.copy(controls.target).add(dir);
  camera.updateProjectionMatrix();
  controls.update();
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
}
frameCamera();
let resizeRAF = 0;
addEventListener('resize', ()=>{ cancelAnimationFrame(resizeRAF); resizeRAF = requestAnimationFrame(frameCamera); });
addEventListener('orientationchange', ()=> setTimeout(frameCamera, 200));
</script>
